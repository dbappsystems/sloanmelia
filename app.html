<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>SloanMelia — Sloan Smith Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  color-scheme: light only;
  --bg: #faf7f2;
  --ink: #0e0c09;
  --gold: #c8922a;
  --gold-light: #f0d090;
  --teal: #1a4a45;
  --cream: #f0ead8;
  --dim: #7a7060;
  --faint: #e5ddd0;
  --white: #ffffff;
  --green: #1a6a2a;
  --red: #9a1a1a;
  --blue: #1a3a7a;
  --purple: #5a1a9a;
  --sidebar-w: 240px;
}
@media (prefers-color-scheme: dark) { html,body { background:#faf7f2!important; color:#0e0c09!important; } }
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#faf7f2!important;color:#0e0c09!important;font-family:'Jost',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
#root{min-height:100vh;}
.mono{font-family:'DM Mono',monospace;}
.serif{font-family:'Playfair Display',serif;}
.gold{color:var(--gold);}
.dim{color:var(--dim);}
.flex{display:flex;}
.items-center{align-items:center;}
.gap1{gap:0.5rem;}
.gap2{gap:1rem;}
.gap3{gap:1.5rem;}
.w100{width:100%;}
.mt1{margin-top:0.5rem;}
.mt2{margin-top:1rem;}
.mt3{margin-top:1.5rem;}
.mb1{margin-bottom:0.5rem;}
.mb2{margin-bottom:1rem;}
.btn{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.65rem 1.4rem;border:none;cursor:pointer;transition:all 0.18s;display:inline-flex;align-items:center;gap:0.4rem;}
.btn-primary{background:var(--ink);color:var(--bg);}
.btn-primary:hover{background:var(--teal);}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:#a87020;}
.btn-outline{background:transparent;border:1px solid var(--ink);color:var(--ink);}
.btn-outline:hover{background:var(--ink);color:var(--bg);}
.btn-ghost{background:transparent;color:var(--dim);padding:0.4rem 0.8rem;font-size:0.58rem;}
.btn-ghost:hover{color:var(--ink);}
.btn-sm{padding:0.4rem 0.9rem;font-size:0.55rem;}
.btn-danger{background:#7a1a1a;color:#fff;}
.btn-danger:hover{background:#9a2a2a;}
.input{width:100%;padding:0.65rem 0.9rem;border:1px solid var(--faint);background:var(--white);font-family:'Jost',sans-serif;font-size:0.88rem;color:var(--ink);outline:none;transition:border 0.18s;}
.input:focus{border-color:var(--gold);}
.input::placeholder{color:#b0a890;}
.label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:0.35rem;}
.select{width:100%;padding:0.65rem 0.9rem;border:1px solid var(--faint);background:var(--white);font-family:'Jost',sans-serif;font-size:0.88rem;color:var(--ink);outline:none;cursor:pointer;}
textarea.input{resize:vertical;min-height:80px;}
.card{background:var(--white);border:1px solid var(--faint);padding:1.2rem 1.4rem;}
.card-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:0.3rem;}
.card-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:0.2rem;}
.badge{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.6rem;display:inline-block;}
.badge-teal{background:#d0eae8;color:var(--teal);}
.badge-gold{background:#faecd0;color:#8a5a10;}
.badge-ink{background:#e8e0d8;color:var(--ink);}
.badge-green{background:#d0eaD0;color:var(--green);}
.badge-blue{background:#d0daea;color:var(--blue);}
.badge-purple{background:#e0d0ea;color:var(--purple);}
.badge-red{background:#ead0d0;color:var(--red);}
.badge-gray{background:#e8e0d8;color:var(--dim);}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;}
.toast{padding:0.8rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;animation:slideIn 0.2s ease;}
.toast-success{background:var(--green);color:#fff;}
.toast-error{background:var(--red);color:#fff;}
.toast-warn{background:var(--gold);color:var(--ink);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.modal-overlay{position:fixed;inset:0;background:rgba(14,12,9,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--bg);max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:2rem;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--dim);line-height:1;}
.sidebar{width:var(--sidebar-w);background:var(--ink);color:#e0d8d0;display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-logo{padding:1.5rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo .monogram{width:36px;height:36px;background:var(--gold);color:var(--ink);font-family:'Playfair Display',serif;font-weight:900;font-size:1rem;display:flex;align-items:center;justify-content:center;margin-bottom:0.5rem;}
.sidebar-logo .app-name{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:#fff;}
.sidebar-logo .app-sub{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:0.1rem;}
.sidebar-nav{flex:1;padding:1rem 0;}
.nav-item{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 1.2rem;cursor:pointer;font-size:0.88rem;color:rgba(255,255,255,0.55);transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.9);}
.nav-item.active{background:rgba(200,146,42,0.12);color:#f0d090;border-left-color:var(--gold);}
.nav-item .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.nav-item .nav-label{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;}
.nav-item.coach-nav{background:rgba(200,146,42,0.08);}
.nav-item.coach-nav.active,.nav-item.coach-nav:hover{background:rgba(200,146,42,0.2);}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.08);}
.sidebar-user{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;color:rgba(255,255,255,0.3);margin-bottom:0.5rem;word-break:break-all;}
.main-area{margin-left:var(--sidebar-w);min-height:100vh;background:var(--bg);}
.page-header{padding:1.5rem 2rem 1rem;border-bottom:1px solid var(--faint);}
.page-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;}
.page-sub{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:0.2rem;}
.page-content{padding:1.5rem 2rem;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--faint);padding:1.2rem;text-align:center;border-top:3px solid var(--ink);}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);display:block;line-height:1;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;display:block;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.section-label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:0.6rem;margin-bottom:0.8rem;}
.section-label::before{content:'';display:block;width:20px;height:1px;background:var(--gold);}
.progress-bar{height:6px;background:var(--faint);overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);transition:width 0.5s;}
.tabs{display:flex;border-bottom:2px solid var(--faint);margin-bottom:1.5rem;}
.tab{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.7rem 1.2rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--dim);transition:all 0.15s;}
.tab.active{color:var(--ink);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--ink);}
.chat-area{display:flex;flex-direction:column;height:calc(100vh - 280px);min-height:400px;}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.8rem;background:var(--white);border:1px solid var(--faint);}
.chat-bubble{max-width:80%;padding:0.8rem 1rem;font-size:0.88rem;line-height:1.65;}
.chat-bubble.user{background:var(--ink);color:#faf7f2;align-self:flex-end;}
.chat-bubble.coach{background:var(--cream);color:var(--ink);align-self:flex-start;border:1px solid var(--faint);}
.chat-input-row{display:flex;gap:0.5rem;margin-top:0.5rem;}
.chat-input{flex:1;padding:0.7rem 1rem;border:1px solid var(--faint);font-family:'Jost',sans-serif;font-size:0.9rem;outline:none;}
.chat-input:focus{border-color:var(--gold);}
.typing{display:flex;gap:0.3rem;align-items:center;padding:0.8rem 1rem;align-self:flex-start;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
.login-screen{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
.login-left{background:var(--ink);color:#faf7f2;display:flex;flex-direction:column;justify-content:center;padding:3rem;}
.login-right{display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{width:100%;max-width:380px;}
.login-form-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--dim);}
.empty-icon{font-size:2.5rem;margin-bottom:0.8rem;opacity:0.4;}
.empty-text{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;margin-bottom:1rem;}
.accordion-item{border:1px solid var(--faint);margin-bottom:0.5rem;}
.accordion-header{padding:1rem 1.2rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:0.92rem;}
.accordion-header:hover{background:var(--cream);}
.accordion-body{padding:0 1.2rem 1rem;font-size:0.88rem;line-height:1.7;color:#3a3020;}
.accordion-body ul{padding-left:1.2rem;margin-top:0.5rem;}
.accordion-body li{margin-bottom:0.3rem;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--faint);}
::-webkit-scrollbar-thumb{background:var(--dim);}
.hamburger{display:none;position:fixed;top:0.8rem;left:0.8rem;z-index:200;width:38px;height:38px;background:var(--ink);border:none;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px;padding:8px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--gold);transition:all 0.2s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(14,12,9,0.5);z-index:99;}
@media(max-width:768px){
  .hamburger{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform 0.25s;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .main-area{margin-left:0;padding-top:3rem;}
  .login-screen{grid-template-columns:1fr;}
  .login-left{display:none;}
  .grid2{grid-template-columns:1fr;}
}
.divider{border:none;border-top:1px solid var(--faint);margin:1.2rem 0;}
.copybox{background:var(--ink);color:#e0d8d0;font-family:'DM Mono',monospace;font-size:0.72rem;padding:1rem;overflow-x:auto;line-height:1.6;}
.info-box{background:var(--cream);border-left:4px solid var(--gold);padding:1rem 1.2rem;font-size:0.88rem;line-height:1.65;margin-bottom:1rem;}
.info-box strong{display:block;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:0.3rem;}
</style>
</head>
<body>
<div id="root"></div>

<script>
// Study Library data
const SRC={OpenStax:{label:'OpenStax',badge:'badge-teal',color:'var(--teal)'},LibreTexts:{label:'LibreTexts',badge:'badge-blue',color:'var(--blue)'},NOBA:{label:'NOBA Project',badge:'badge-purple',color:'var(--purple)'},Frontiers:{label:'Frontiers OA',badge:'badge-green',color:'var(--green)'},SSRN:{label:'SSRN Free',badge:'badge-ink',color:'var(--ink)'},APA:{label:'APA Official',badge:'badge-gold',color:'var(--gold)'},Tool:{label:'Free Tool',badge:'badge-gold',color:'#c8922a'},Poster:{label:'SloanMelia Ref',badge:'badge-teal',color:'var(--teal)'}};
const YEARS=['All','📌 Reference Posters','🌱 Freshman','🌿 Sophomore','🌳 Junior','🎓 Senior',"🔬 Master's",'🏛️ Doctoral','⚡ Research Tools'];
const YEAR_COLOR={'📌 Reference Posters':'var(--teal)','🌱 Freshman':'var(--green)','🌿 Sophomore':'#2a7a4a','🌳 Junior':'var(--teal)','🎓 Senior':'var(--gold)',"🔬 Master's":'var(--blue)','🏛️ Doctoral':'var(--purple)','⚡ Research Tools':'#c8922a'};
const YEAR_BADGE={'📌 Reference Posters':'badge-teal','🌱 Freshman':'badge-green','🌿 Sophomore':'badge-green','🌳 Junior':'badge-teal','🎓 Senior':'badge-gold',"🔬 Master's":'badge-blue','🏛️ Doctoral':'badge-purple','⚡ Research Tools':'badge-gold'};
const STUDY_TOPICS=[
{id:1,year:'📌 Reference Posters',title:'Brain & Neuroscience',src:'Poster',url:'',desc:'The biological foundation of behavior, emotion, and criminal mind.',concepts:['Limbic system and emotional regulation','Prefrontal cortex and impulse control','Neuroplasticity and trauma','Brain imaging in forensic contexts','Psychopathy and brain differences','Neurotransmitters and behavior']},
{id:2,year:'📌 Reference Posters',title:'DSM-5 Diagnostic Reference',src:'Poster',url:'',desc:'Mental disorder classification system used in forensic evaluations.',concepts:['Multiaxial assessment replaced by specifiers','Personality disorder clusters A/B/C','Psychotic disorder spectrum','Trauma and stressor-related disorders','Substance use disorder criteria','Malingering vs genuine disorder']},
{id:3,year:'📌 Reference Posters',title:'Theorists Timeline',src:'Poster',url:'',desc:'From Freud to modern forensic psychology pioneers.',concepts:['Freud: unconscious and defense mechanisms','Skinner: behavioral reinforcement','Bandura: social learning theory','Kohlberg: moral development stages','Hare: psychopathy assessment (PCL-R)','Seligman: learned helplessness']},
{id:4,year:'📌 Reference Posters',title:'Research Methods & Statistics',src:'Poster',url:'',desc:'Scientific foundation of psychological research.',concepts:['Experimental vs correlational design','Validity: internal and external','Reliability: test-retest, inter-rater','Statistical significance (p-value)','Effect size and practical significance','Ethical research principles (APA)']},
{id:5,year:'📌 Reference Posters',title:'Defense Mechanisms',src:'Poster',url:'',desc:'Psychological defenses relevant to criminal behavior analysis.',concepts:['Repression: unconscious blocking','Rationalization: justifying actions','Projection: attributing to others','Denial: refusing to acknowledge','Displacement: redirecting emotion','Sublimation: channeling productively']},
{id:6,year:'📌 Reference Posters',title:'Human Development',src:'Poster',url:'',desc:'Lifespan development theories critical to forensic assessment.',concepts:["Erikson's 8 psychosocial stages","Piaget's cognitive stages","Vygotsky's zone of proximal development",'Attachment theory (Bowlby)','Adverse childhood experiences (ACEs)','Adolescent brain development']},
{id:7,year:'📌 Reference Posters',title:'Cognitive Biases',src:'Poster',url:'',desc:'How thinking errors affect judgment, perception, and testimony.',concepts:['Confirmation bias in investigation','Hindsight bias in evaluation','Availability heuristic','Anchoring effect in assessment','Eyewitness memory fallibility','Implicit bias in the justice system']},
{id:8,year:'📌 Reference Posters',title:'APA Ethics Code',src:'Poster',url:'https://www.apa.org/ethics/code',desc:'Professional ethical obligations guiding all psychologists.',concepts:['Informed consent requirements','Confidentiality and its limits','Dual relationship avoidance','Competence boundaries','Accurate test reporting','Mandatory reporting obligations']},
{id:9,year:'📌 Reference Posters',title:'Biology & Physiology',src:'Poster',url:'',desc:'Body systems that support psychological function.',concepts:['Autonomic nervous system responses','HPA axis and stress response','Sleep and mental health connection','Nutrition and brain function','Genetic influences on behavior','Immune-brain interactions']},
{id:10,year:'📌 Reference Posters',title:'Sociology & Social Theory',src:'Poster',url:'',desc:'Social forces shaping criminal behavior and justice.',concepts:["Durkheim's anomie theory","Merton's strain theory",'Labeling theory and stigma','Social control theory','Intersectionality in justice','Recidivism and social factors']},
{id:11,year:'📌 Reference Posters',title:'Philosophy of Mind',src:'Poster',url:'https://openstax.org/details/books/introduction-philosophy',desc:'Consciousness, free will, and moral responsibility.',concepts:['Determinism vs free will debate','Consciousness and self-awareness','Personal identity over time','Moral responsibility standards','The mind-body problem','Competency and culpability standards']},
{id:12,year:'📌 Reference Posters',title:'Pharmacology Basics',src:'Poster',url:'',desc:'Psychoactive substances and their behavioral effects.',concepts:['CNS stimulants and depressants','Antipsychotic mechanisms','Antidepressant classes (SSRIs etc.)','Substance dependence physiology','Drug-induced psychosis','Medication compliance in forensic settings']},
{id:13,year:'📌 Reference Posters',title:'Law & Psychology Interface',src:'Poster',url:'https://ssrn.com/en/index.cfm/psy/',desc:'How psychological science enters the legal system.',concepts:['Competency to stand trial standards','Criminal responsibility (mens rea)','Insanity defense standards','Risk assessment instruments','Expert witness role and limits','Miranda rights and interrogation psychology']},
{id:14,year:'📌 Reference Posters',title:'Communication & Testimony',src:'Poster',url:'',desc:'Expert witness skills and forensic report writing.',concepts:['Report structure and objectivity','Cross-examination preparation','Translating jargon for juries','Daubert/Frye admissibility standards','Ethical boundaries in testimony','Non-verbal communication awareness']},
{id:15,year:'📌 Reference Posters',title:'Academic Writing',src:'Poster',url:'https://socialsci.libretexts.org',desc:'Research paper and report writing standards for psychology.',concepts:['APA 7th edition formatting','Thesis statement construction','Literature review methodology','Citation and plagiarism rules','Abstract writing','Statistical results reporting']},
{id:16,year:'📌 Reference Posters',title:'Program Administration',src:'Poster',url:'',desc:'Clinical and forensic program management fundamentals.',concepts:['HIPAA and confidentiality rules','Supervision and consultation ethics','Case documentation standards','Crisis intervention protocols','Team communication frameworks','Forensic unit security protocols']},
{id:17,year:'🌱 Freshman',title:'Introduction to Psychology',src:'OpenStax',url:'https://openstax.org/details/books/psychology-2e',desc:'The gateway course. Brain, behavior, development, disorders, and DSM-5 overview.',concepts:['Biological bases of behavior','States of consciousness','Learning theory','Memory and cognition','Psychological disorders overview','Social psychology basics']},
{id:18,year:'🌱 Freshman',title:'Introduction to Sociology',src:'OpenStax',url:'https://openstax.org/details/books/introduction-sociology-3e',desc:'Social systems, crime, inequality, and the forces that shape human behavior.',concepts:["Durkheim's social facts",'Social stratification','Deviance and crime theory','Race, class, and gender','Social institutions','Socialization and identity']},
{id:19,year:'🌱 Freshman',title:'Introduction to Statistics',src:'OpenStax',url:'https://openstax.org/details/books/introductory-statistics',desc:'The math language of psychology research. Every PhD defense uses statistics.',concepts:['Descriptive statistics','Probability foundations','Hypothesis testing','Confidence intervals','Chi-square and t-tests','Data visualization']},
{id:20,year:'🌱 Freshman',title:'College Algebra',src:'OpenStax',url:'https://openstax.org/details/books/college-algebra-2e',desc:'The mathematical scaffolding beneath statistics and quantitative reasoning.',concepts:['Linear equations and functions','Polynomial and rational functions','Exponential and logarithmic functions','Systems of equations','Sequences and series','Matrix basics']},
{id:21,year:'🌱 Freshman',title:'Introduction to Biology',src:'OpenStax',url:'https://openstax.org/details/books/concepts-biology',desc:'Cell biology, genetics, evolution, and body systems. Gateway to neuroscience.',concepts:['Cell structure and function','DNA, genes, and heredity','Evolution by natural selection','Nervous system basics','Hormones and endocrine system','Genetics and behavior']},
{id:22,year:'🌱 Freshman',title:'Introduction to Philosophy',src:'OpenStax',url:'https://openstax.org/details/books/introduction-philosophy',desc:'Free will, moral responsibility, and consciousness.',concepts:['Logic and argumentation','Free will vs. determinism','Moral responsibility','Consciousness and mind','Ethics foundations','Epistemology']},
{id:23,year:'🌱 Freshman',title:'U.S. History',src:'OpenStax',url:'https://openstax.org/details/books/us-history',desc:'The legal, social, and political context in which American criminal justice evolved.',concepts:['Constitutional foundations','Civil rights movements','Criminal justice history','Social reform movements','Federal vs. state law','Policy and legislation evolution']},

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CLOUDFLARE API CLIENT ─────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('sm_token') || ''; }
function getUser() {
  const t = getToken();
  if (!t) return null;
  try {
    const parts = t.split('.');
    const pad = (4 - parts[1].length % 4) % 4;
    const payload = JSON.parse(atob(parts[1] + '='.repeat(pad)));
    if (payload.exp < Date.now()) { localStorage.removeItem('sm_token'); return null; }
    return { id: payload.userId, email: payload.email, role: payload.role || 'student' };
  } catch { return null; }
}
async function api(path, options = {}) {
  const res = await fetch('/api/' + path, {
    ...options,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken(), ...(options.headers || {}) },
    body: options.body ? (typeof options.body === 'string' ? options.body : JSON.stringify(options.body)) : undefined
  });
  if (!res.ok) { const e = await res.json().catch(() => ({ error: 'Failed' })); throw new Error(e.error || 'Failed'); }
  return res.json();
}
async function apiForm(path, formData) {
  const res = await fetch('/api/' + path, { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: formData });
  if (!res.ok) { const e = await res.json().catch(() => ({ error: 'Upload failed' })); throw new Error(e.error || 'Upload failed'); }
  return res.json();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return <div className="toast-container">{toasts.map(t => <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = (msg, type='success') => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  };
  return { toasts, toast: add };
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={wide?{maxWidth:800}:{}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title serif">{title}</div>
          <button className="modal-close" onClick={onClose}>&#x2715;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function daysUntil(dateStr) {
  return Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24));
}

// ── GPA SYSTEM ────────────────────────────────────────────────────────────────
const GRADE_POINTS = {'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'D-':0.7,'F':0.0,'WF':0.0,'P':null,'W':null,'I':null};
function gradeToPoints(letter) { if(!letter) return null; return GRADE_POINTS[letter.trim().toUpperCase()] ?? null; }
function calcGPA(grades) {
  const eligible = grades.filter(g => g.grade_points !== null && g.credit_hours > 0);
  if(!eligible.length) return null;
  const totalPts = eligible.reduce((s,g)=>s+(g.grade_points*g.credit_hours),0);
  const totalCr = eligible.reduce((s,g)=>s+g.credit_hours,0);
  return totalCr > 0 ? Math.round((totalPts/totalCr)*1000)/1000 : null;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, toast }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if(!email||!pw) return;
    setLoading(true);
    try {
      const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, password:pw}) });
      const data = await res.json();
      if(!res.ok) { toast(data.error||'Invalid credentials','error'); setLoading(false); return; }
      localStorage.setItem('sm_token', data.token);
      localStorage.setItem('sm_userId', data.userId);
      localStorage.setItem('sm_email', data.email);
      localStorage.setItem('sm_role', data.role||'student');
      onLogin({ id:data.userId, email:data.email, role:data.role||'student' });
    } catch(e) { toast('Connection error. Try again.','error'); setLoading(false); }
  };

  return (
    <div className="login-screen">
      <div className="login-left">
        <div style={{marginBottom:'1rem'}}>
          <div className="mono" style={{fontSize:'0.55rem',letterSpacing:'0.25em',textTransform:'uppercase',color:'rgba(200,146,42,0.8)',marginBottom:'1rem'}}>sloanmelia.com</div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:'3rem',fontWeight:900,lineHeight:1.05,marginBottom:'0.5rem'}}>Sloan<br/><em style={{color:'var(--gold)'}}>Melia</em></div>
          <div style={{fontFamily:'Playfair Display,serif',fontStyle:'italic',fontSize:'1.1rem',color:'rgba(255,255,255,0.5)',marginBottom:'2rem'}}>From Senior Year to Dr. Smith</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'0.8rem'}}>
          {['AI College Coach','Document Vault','College Tracker','Financial Aid Hub','Study Library'].map(f=>(
            <div key={f} style={{display:'flex',alignItems:'center',gap:'0.7rem',fontSize:'0.85rem',color:'rgba(255,255,255,0.6)'}}>
              <span style={{color:'var(--gold)'}}>&#x2713;</span> {f}
            </div>
          ))}
        </div>
      </div>
      <div className="login-right">
        <div className="login-box">
          <div style={{marginBottom:'1.5rem'}}>
            <div className="mono" style={{fontSize:'0.55rem',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.4rem'}}>Welcome Back</div>
            <h2 className="login-form-title serif">Sign In</h2>
          </div>
          <div className="mb2">
            <label className="label">Email</label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="sloan@sloanmelia.com" onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
          <div className="mb2">
            <label className="label">Password</label>
            <input className="input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
          <button className="btn btn-primary w100 mt1" onClick={submit} disabled={loading} style={{justifyContent:'center'}}>
            {loading ? '...' : 'Sign In \u2192'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── VAULT ─────────────────────────────────────────────────────────────────────
const DOC_CATS=['Transcript','Test Scores','Recommendation Letter','Essay','Certificate','Resume','Financial','Other'];
const CAT_BADGE={Transcript:'badge-blue','Test Scores':'badge-teal','Recommendation Letter':'badge-gold',Essay:'badge-green',Certificate:'badge-teal',Resume:'badge-gold',Financial:'badge-red',Other:'badge-gray'};

function VaultModule({ user, toast }) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cat, setCat] = useState('Transcript');
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const load = async () => {
    try { const data = await api('documents'); setDocs(Array.isArray(data)?data:[]); } catch(e) { setDocs([]); }
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const upload = async (file) => {
    if(!file) return;
    if(file.size>10*1024*1024) { toast('File must be under 10MB','error'); return; }
    setUploading(true);
    try {
      const docId = (crypto.randomUUID?crypto.randomUUID():Date.now().toString());
      const fd = new FormData();
      fd.append('file',file); fd.append('docId',docId);
      const vaultRes = await apiForm('vault/upload', fd);
      await api('documents', {method:'POST', body:JSON.stringify({name:file.name,category:cat,file_key:vaultRes.key,file_size:file.size})});
      toast('Document uploaded!','success');
    } catch(e) { toast('Upload failed: '+e.message,'error'); }
    setUploading(false);
    load();
  };

  const del = async (doc) => {
    if(!window.confirm('Delete '+doc.name+'?')) return;
    try { await api('documents/'+doc.id,{method:'DELETE'}); toast('Document deleted','success'); } catch(e) { toast('Delete failed','error'); }
    load();
  };

  const fmtSize = (b) => { if(!b) return ''; if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(0)+'KB'; return (b/1048576).toFixed(1)+'MB'; };

  return (
    <div>
      <div className="page-header">
        <div className="page-title serif">Document <em style={{color:'var(--gold)'}}>Vault</em></div>
        <div className="page-sub">Securely store all your application documents</div>
      </div>
      <div className="page-content">
        <div className="card" style={{borderTop:'3px solid var(--gold)',marginBottom:'1.5rem'}}>
          <div className="section-label">Upload New Document</div>
          <div style={{marginBottom:'0.8rem'}}>
            <label className="label">Category</label>
            <select className="select" value={cat} onChange={e=>setCat(e.target.value)}>{DOC_CATS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div style={{border:'2px dashed var(--faint)',padding:'2rem',textAlign:'center',cursor:'pointer',background:'var(--bg)'}}
            onClick={()=>fileRef.current.click()}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--gold)';}}
            onDragLeave={e=>{e.currentTarget.style.borderColor='var(--faint)';}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--faint)';upload(e.dataTransfer.files[0]);}}>
            <div style={{fontSize:'2rem',marginBottom:'0.5rem'}}>&#x1F4CE;</div>
            <div style={{fontSize:'0.88rem',color:'var(--dim)'}}>Drag &amp; drop or <span style={{color:'var(--gold)',fontWeight:600}}>click to browse</span></div>
            <div style={{fontSize:'0.75rem',color:'var(--dim)',marginTop:'0.3rem'}}>Max 10MB · PDF, DOC, JPG, PNG</div>
            {uploading&&<div style={{marginTop:'0.5rem',color:'var(--gold)',fontFamily:'DM Mono,monospace',fontSize:'0.65rem',letterSpacing:'0.1em'}}>UPLOADING...</div>}
          </div>
          <input ref={fileRef} type="file" style={{display:'none'}} onChange={e=>upload(e.target.files[0])}/>
        </div>
        {loading?<div className="empty-state"><div className="typing"><span/><span/><span/></div></div>:
          docs.length===0?(
            <div className="empty-state">
              <div className="empty-icon">&#x1F4C1;</div>
              <div className="empty-text">No documents yet</div>
              <div style={{fontSize:'0.82rem',color:'var(--dim)'}}>Upload your transcript, recommendation letters, and resume above</div>
            </div>
          ):(
            <div>
              <div className="section-label">{docs.length} Document{docs.length!==1?'s':''} Stored</div>
              {docs.map(doc=>(
                <div key={doc.id} className="card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.5rem',padding:'0.8rem 1.2rem'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'0.8rem'}}>
                    <span style={{fontSize:'1.2rem'}}>&#x1F4C4;</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:'0.9rem'}}>{doc.name}</div>
                      <div style={{display:'flex',gap:'0.5rem',marginTop:'0.2rem',alignItems:'center'}}>
                        <span className={`badge ${CAT_BADGE[doc.category]||'badge-gray'}`}>{doc.category}</span>
                        <span style={{fontSize:'0.75rem',color:'var(--dim)'}}>{fmtSize(doc.file_size)} · {new Date(doc.created_at).toLocaleDateString()}</span>
                      </div>
                    </div>
                  </div>
                  <button className="btn btn-danger btn-sm" onClick={()=>del(doc)}>Delete</button>
                </div>
              ))}
            </div>
          )
        }
      </div>
    </div>
  );
}

const SEED_SCHOOLS=[{school_name:'Southern Illinois University Edwardsville (SIUE)',portal_url:'https://www.siue.edu',status:'researching',notes:'Strong psychology program near home'},{school_name:'University of Illinois Springfield',portal_url:'https://www.uis.edu',status:'researching',notes:'Good forensic science resources'},{school_name:'Missouri Baptist University',portal_url:'https://www.mobap.edu',status:'researching',notes:'Christian university, smaller class sizes'},{school_name:'Saint Louis University',portal_url:'https://www.slu.edu',status:'researching',notes:'Strong clinical psych program'}];
const STATUS_COLORS={researching:'badge-gray','in-progress':'badge-gold',submitted:'badge-blue',accepted:'badge-green',waitlisted:'badge-teal',rejected:'badge-red'};
const STATUS_LABELS={researching:'Researching','in-progress':'In Progress',submitted:'Submitted',accepted:'Accepted',waitlisted:'Waitlisted',rejected:'Rejected'};

function TrackerModule({ user, toast }) {
  const [schools, setSchools] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({school_name:'',deadline:'',portal_url:'',status:'researching',notes:''});

  const load = async () => {
    try {
      let data = await api('colleges');
      if(!Array.isArray(data)) data=[];
      if(data.length===0) {
        await Promise.all(SEED_SCHOOLS.map(s=>api('colleges',{method:'POST',body:JSON.stringify(s)})));
        data = await api('colleges');
      }
      setSchools(Array.isArray(data)?data:[]);
    } catch(e) { setSchools([]); }
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const add = async () => {
    if(!form.school_name) return;
    try { await api('colleges',{method:'POST',body:JSON.stringify(form)}); toast('School added!'); setShowAdd(false); setForm({school_name:'',deadline:'',portal_url:'',status:'researching',notes:''}); load(); }
    catch(e) { toast('Could not add school','error'); }
  };

  const updateStatus = async (id, status) => {
    try { const s=schools.find(x=>x.id===id); if(s) await api('colleges/'+id,{method:'PUT',body:JSON.stringify({...s,status})}); setSchools(prev=>prev.map(s=>s.id===id?{...s,status}:s)); }
    catch(e) {}
  };

  return (
    <div>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:'1rem'}}>
        <div>
          <div className="page-title serif">College <em style={{color:'var(--gold)'}}>Tracker</em></div>
          <div className="page-sub">Track deadlines, statuses, and requirements</div>
        </div>
        <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>+ Add School</button>
      </div>
      <div className="page-content">
        {loading?<div className="empty-state"><div className="typing"><span/><span/><span/></div></div>:
          schools.map(s=>{
            const daysLeft=s.deadline?daysUntil(s.deadline):null;
            return(
              <div key={s.id} className="card" style={{marginBottom:'1rem',borderLeft:`4px solid ${s.status==='accepted'?'var(--green)':s.status==='rejected'?'var(--red)':'var(--ink)'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'0.5rem'}}>
                  <div>
                    <div className="card-title" style={{fontSize:'1.05rem'}}>{s.school_name}</div>
                    <div style={{display:'flex',gap:'0.5rem',marginTop:'0.4rem',flexWrap:'wrap',alignItems:'center'}}>
                      <span className={`badge ${STATUS_COLORS[s.status]||'badge-gray'}`}>{STATUS_LABELS[s.status]||s.status}</span>
                      {daysLeft!==null&&<span style={{fontSize:'0.78rem',color:daysLeft<14?'var(--red)':'var(--dim)',fontFamily:'DM Mono,monospace'}}>{daysLeft>0?`${daysLeft} days remaining`:'Past deadline'}</span>}
                      {s.portal_url&&<a href={s.portal_url} target="_blank" rel="noreferrer" style={{fontSize:'0.75rem',color:'var(--gold)'}}>Portal &#x2192;</a>}
                    </div>
                  </div>
                  <select className="select" style={{width:'auto',fontSize:'0.78rem'}} value={s.status} onChange={e=>updateStatus(s.id,e.target.value)}>
                    {Object.entries(STATUS_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
                {s.notes&&<div style={{marginTop:'0.6rem',fontSize:'0.83rem',color:'var(--dim)',fontStyle:'italic'}}>{s.notes}</div>}
                <div style={{marginTop:'0.8rem',display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
                  {['Transcript','Rec Letters','Personal Essay','App Fee','Test Scores'].map(item=>(
                    <span key={item} style={{fontSize:'0.72rem',padding:'0.2rem 0.6rem',border:'1px solid var(--faint)',color:'var(--dim)',fontFamily:'DM Mono,monospace'}}>&#x2610; {item}</span>
                  ))}
                </div>
              </div>
            );
          })
        }
      </div>
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Add College">
        <div className="mb2"><label className="label">School Name *</label><input className="input" value={form.school_name} onChange={e=>setForm(p=>({...p,school_name:e.target.value}))} placeholder="University name"/></div>
        <div className="mb2"><label className="label">Application Deadline</label><input className="input" type="date" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>

        <div className="mb2"><label className="label">Notes</label><textarea className="input" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any notes about this school..."/></div>
        <button className="btn btn-gold" onClick={add}>Add School</button>
      </Modal>
    </div>
  );

const FAFSA_SECTIONS=[{title:'Before You Start — What to Gather',content:<ul><li>Prior year tax returns for parents AND student</li><li>W-2 forms</li><li>Bank account balances</li><li>Social Security numbers</li><li>FSA ID — create at <strong>studentaid.gov</strong></li><li>List of schools to add to FAFSA</li></ul>},{title:'Key FAFSA Facts',content:<ul><li>FAFSA opens <strong>October 1</strong> each year</li><li>Illinois priority deadline: typically <strong>late January</strong> — check isac.org</li><li><strong>Student Aid Index (SAI)</strong> replaced EFC starting 2024-2025</li><li>FAFSA is FREE — never pay to file it</li></ul>},{title:"What Counts as Assets (and What Doesn't)",content:<ul><li>Parent assets counted at max <strong>5.64%</strong> toward SAI</li><li>Student assets counted at <strong>20%</strong> — keep student balances low</li><li>Parent-owned <strong>529 plan: only 5.64% counts</strong></li><li><strong>Primary home equity: does NOT count</strong></li><li><strong>Retirement accounts: do NOT count</strong></li></ul>},{title:'Illinois-Specific Aid',content:<ul><li><strong>MAP Grant</strong>: up to $5,968/year for IL residents with financial need</li><li>SIUE, UIS, and SLU all have MAP-eligible programs</li><li>Award renewable each year with re-filed FAFSA</li></ul>},{title:'Understanding Your Award Letter',content:<ul><li>Mix of <strong>grants (free money)</strong>, <strong>loans (pay back)</strong>, and work-study</li><li><strong>Net price = total cost minus GRANTS ONLY</strong></li><li>Contact financial aid offices to negotiate — it is allowed</li></ul>}];

function FinancialModule({ user, toast }) {
  const [tab, setTab] = useState('fafsa');
  const [openSection, setOpenSection] = useState(null);
  const [scholarships, setScholarships] = useState([]);
  const [balance529, setBalance529] = useState('');
  const [targetCost, setTargetCost] = useState('');

  const loadScholarships = async () => {
    try {
      let data = await api('scholarships');
      if(!Array.isArray(data)) data=[];
      if(data.length===0) {
        await Promise.all(SCHOLARSHIPS_SEED.map(s=>api('scholarships',{method:'POST',body:JSON.stringify(s)})));
        data = await api('scholarships');
      }
      setScholarships(Array.isArray(data)?data:[]);
    } catch(e) { setScholarships([]); }
  };
  useEffect(()=>{ if(tab==='scholarships') loadScholarships(); },[tab]);

  const updateScholarshipStatus = async (id, status) => {
    try { const s=scholarships.find(x=>x.id===id); if(s) await api('scholarships/'+id,{method:'PUT',body:JSON.stringify({...s,status})}); setScholarships(prev=>prev.map(x=>x.id===id?{...x,status}:x)); }
    catch(e) {}
  };

  const totalPotential = scholarships.filter(s=>s.status==='submitted'||s.status==='awarded').reduce((a,s)=>a+(s.amount_max||0),0);

  const calc529 = () => {
    const bal=parseFloat(balance529)||0, annual=parseFloat(targetCost)||0, years=2026-new Date().getFullYear();
    const projected=bal*Math.pow(1.06,years), total4yr=annual*4;
    return {projected:projected.toFixed(0),total4yr:total4yr.toFixed(0),pct:total4yr>0?Math.min(100,(projected/total4yr)*100).toFixed(0):0};
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title serif">Financial <em style={{color:'var(--gold)'}}>Aid Hub</em></div>
        <div className="page-sub">FAFSA guide · 529 tracker · Scholarship database</div>
      </div>
      <div className="page-content">
        <div className="tabs">
          {[['fafsa','📋 FAFSA Guide'],['529','💰 529 Tracker'],['scholarships','🏆 Scholarships']].map(([id,label])=>(
            <div key={id} className={`tab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</div>
          ))}
        </div>
        {tab==='fafsa'&&(
          <div>
            <div className="info-box" style={{marginBottom:'1.5rem'}}><strong>Illinois Priority Deadline</strong>File your FAFSA as early as possible after October 1. Check <strong>isac.org</strong> for the exact current year deadline.</div>
            {FAFSA_SECTIONS.map((s,i)=>(
              <div key={i} className="accordion-item">
                <div className="accordion-header" onClick={()=>setOpenSection(openSection===i?null:i)}>{s.title}<span>{openSection===i?'▲':'▼'}</span></div>
                {openSection===i&&<div className="accordion-body">{s.content}</div>}
              </div>
            ))}
          </div>
        )}
        {tab==='529'&&(
          <div>
            <div className="info-box"><strong>Illinois Bright Start 529 Plan Key Facts</strong>State tax deduction: $10,000/yr single · Earnings grow tax-FREE · FAFSA impact: only 5.64% counts · <a href="https://www.brightstartsavings.com" target="_blank" rel="noreferrer" style={{color:'var(--gold)'}}>brightstartsavings.com &#x2192;</a></div>
            <div className="grid2">
              <div>
                <label className="label">Current 529 Balance ($)</label>
                <input className="input mb2" type="number" value={balance529} onChange={e=>setBalance529(e.target.value)} placeholder="25000"/>
                <label className="label">Target School Annual Cost ($)</label>
                <input className="input" type="number" value={targetCost} onChange={e=>setTargetCost(e.target.value)} placeholder="30000"/>
              </div>
              <div className="card">
                <div className="card-label">529 Coverage Projection</div>
                {balance529&&targetCost?(()=>{const{projected,total4yr,pct}=calc529();return<><div style={{fontSize:'2rem',fontFamily:'Playfair Display,serif',fontWeight:900,color:'var(--gold)'}}>{pct}%</div><div style={{fontSize:'0.82rem',color:'var(--dim)',marginBottom:'0.8rem'}}>of projected 4-year costs covered</div><div className="progress-bar mb2"><div className="progress-fill" style={{width:pct+'%'}}/></div><div style={{fontSize:'0.8rem',lineHeight:1.8}}><div>Projected balance: <strong>${parseInt(projected).toLocaleString()}</strong></div><div>4-year cost: <strong>${parseInt(total4yr).toLocaleString()}</strong></div><div>Gap: <strong>${Math.max(0,parseInt(total4yr)-parseInt(projected)).toLocaleString()}</strong></div></div></>})():<div style={{color:'var(--dim)',fontSize:'0.85rem'}}>Enter your balance and target school cost to see projection</div>}
              </div>
            </div>
          </div>
        )}
        {tab==='scholarships'&&(
          <div>
            {totalPotential>0&&<div className="card" style={{borderTop:'3px solid var(--green)',marginBottom:'1.5rem'}}><div className="card-label" style={{color:'var(--green)'}}>Potential Aid Submitted</div><div style={{fontSize:'2rem',fontFamily:'Playfair Display,serif',fontWeight:900,color:'var(--green)'}}>${totalPotential.toLocaleString()}</div><div style={{fontSize:'0.8rem',color:'var(--dim)'}}>maximum from submitted applications</div></div>}
            {scholarships.map(s=>(
              <div key={s.id} className="card" style={{marginBottom:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'0.5rem'}}>
                  <div>
                    <div className="card-title">{s.name}</div>
                    <div style={{display:'flex',gap:'0.5rem',marginTop:'0.3rem',alignItems:'center',flexWrap:'wrap'}}>
                      <span className={`badge ${STATUS_COLORS[s.status]||'badge-gray'}`}>{s.status}</span>
                      <span style={{fontSize:'0.8rem',color:'var(--green)',fontWeight:600}}>{s.amount_max?`Up to $${s.amount_max.toLocaleString()}`:''}</span>
                      {s.url&&<a href={s.url} target="_blank" rel="noreferrer" style={{fontSize:'0.75rem',color:'var(--gold)'}}>Info &#x2192;</a>}
                    </div>
                    {s.requirements&&<div style={{fontSize:'0.8rem',color:'var(--dim)',marginTop:'0.4rem'}}>{s.requirements}</div>}
                  </div>
                  <select className="select" style={{width:'auto',fontSize:'0.78rem'}} value={s.status} onChange={e=>updateScholarshipStatus(s.id,e.target.value)}>
                    {['researching','drafting','submitted','awarded','not-selected'].map(v=><option key={v}>{v}</option>)}
                  </select>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const SEMESTERS=['Fall 2022','Spring 2023','Fall 2023','Spring 2024','Fall 2024','Spring 2025','Fall 2025','Spring 2026'];

function GpaModule({ user, toast }) {
  const [grades, setGrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({course_name:'',grade_letter:'A',credit_hours:1,semester:'Fall 2025',is_ap:false,is_honors:false});
  const [saving, setSaving] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [parsing, setParsing] = useState(false);
  const [tab, setTab] = useState('view');

  const load = async () => {
    setLoading(true);
    try { const data=await api('grades'); setGrades(Array.isArray(data)?data:[]); } catch(e) { setGrades([]); }
    setLoading(false);
  };
  useEffect(()=>{ load(); },[user]);

  const gpa = calcGPA(grades);
  const byTerm = grades.reduce((acc,g)=>{ const k=g.semester||'Unknown'; if(!acc[k]) acc[k]=[]; acc[k].push(g); return acc; },{});

  const addGrade = async () => {
    if(!form.course_name.trim()) { toast('Enter a course name'); return; }
    setSaving(true);
    try {
      await api('grades',{method:'POST',body:JSON.stringify({course_name:form.course_name.trim(),grade_letter:form.grade_letter,grade_points:gradeToPoints(form.grade_letter),credit_hours:parseFloat(form.credit_hours),semester:form.semester,grade_year:parseInt(form.semester.split(' ')[1]||'2025'),is_ap:form.is_ap,is_honors:form.is_honors,source:'manual'})});
      toast('Course added!');
      setForm({course_name:'',grade_letter:'A',credit_hours:1,semester:'Fall 2025',is_ap:false,is_honors:false});
    } catch(e) { toast('Error saving: '+e.message); }
    setSaving(false);
    await load();
  };

  const deleteGrade = async (id) => {
    try { await api('grades/'+id,{method:'DELETE'}); } catch(e) {}
    await load();
    toast('Removed');
  };

  const parseTranscript = async () => {
    if(!pasteText.trim()) { toast('Paste your transcript text first'); return; }
    setParsing(true);
    try {
      const data = await api('coach',{method:'POST',body:JSON.stringify({messages:[{role:'user',content:`Parse this transcript and return ONLY a JSON array. Each item: course_name, grade_letter, credit_hours (default 1), semester (e.g. "Fall 2024"), is_ap (bool), is_honors (bool).\n\nTranscript:\n${pasteText}\n\nReturn ONLY the JSON array.`}]})});
      const text = data.content||'';
      const cleaned = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(cleaned);
      if(!Array.isArray(parsed)||parsed.length===0) { toast('Could not parse — try adding manually'); setParsing(false); return; }
      const rows = parsed.map(r=>({course_name:r.course_name,grade_letter:r.grade_letter,grade_points:gradeToPoints(r.grade_letter),credit_hours:parseFloat(r.credit_hours)||1,semester:r.semester||'Unknown',grade_year:parseInt((r.semester||'2025').split(' ').pop())||2025,is_ap:!!r.is_ap,is_honors:!!r.is_honors,source:'parsed'}));
      await Promise.all(rows.map(r=>api('grades',{method:'POST',body:JSON.stringify(r)})));
      toast(`Imported ${rows.length} courses!`);
      setPasteText('');
      setTab('view');
      await load();
    } catch(e) { toast('Parse failed — try manual entry'); }
    setParsing(false);
  };

  const gpaColor = gpa===null?'var(--dim)':gpa>=3.7?'#059669':gpa>=3.3?'#d97706':'#dc2626';

  return (
    <div>
      <div className="page-header">
        <div className="page-title serif">GPA <em style={{color:'var(--gold)'}}>Tracker</em></div>
        <div className="page-sub">Cumulative GPA calculated from all courses</div>
      </div>
      <div className="page-content">
        <div className="card" style={{borderTop:`4px solid ${gpaColor}`,marginBottom:'1.5rem',textAlign:'center',padding:'1.5rem'}}>
          <div style={{fontSize:'3.5rem',fontWeight:900,color:gpaColor,fontFamily:'serif',lineHeight:1}}>{gpa!==null?gpa.toFixed(3):'—'}</div>
          <div style={{fontSize:'0.85rem',color:'var(--dim)',marginTop:'0.4rem'}}>Cumulative GPA · {grades.filter(g=>g.grade_points!==null).length} courses · {grades.reduce((s,g)=>s+parseFloat(g.credit_hours||1),0)} credit hours</div>
          {grades.length===0&&<div style={{marginTop:'0.8rem',fontSize:'0.85rem',color:'var(--dim)'}}>Add courses manually or paste your transcript below to get started</div>}
        </div>
        <div style={{display:'flex',gap:'0.5rem',marginBottom:'1.2rem'}}>
          {[['view','📊 View Courses'],['add','➕ Add Course'],['parse','📋 Import Transcript']].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)} className="btn btn-sm" style={{background:tab===t?'var(--ink)':'transparent',color:tab===t?'var(--cream)':'var(--dim)',border:'1px solid var(--faint)',fontSize:'0.8rem'}}>{label}</button>
          ))}
        </div>
        {tab==='view'&&(
          loading?<div style={{color:'var(--dim)'}}>Loading...</div>:
          grades.length===0?<div className="info-box">No courses yet. Add them manually or import your transcript.</div>:
          Object.entries(byTerm).sort().map(([semester,termGrades])=>(
            <div key={semester} style={{marginBottom:'1.5rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                <div className="section-label">{semester}</div>
                <div style={{fontSize:'0.8rem',fontFamily:'monospace',color:gpaColor,fontWeight:700}}>Term GPA: {calcGPA(termGrades)?.toFixed(3)||'N/A'}</div>
              </div>
              {termGrades.map(g=>(
                <div key={g.id} className="card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.7rem 1rem',marginBottom:'0.4rem',borderLeft:`3px solid ${g.grade_points>=3.7?'#059669':g.grade_points>=2.7?'#d97706':g.grade_points!==null?'#dc2626':'var(--faint)'}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:'0.9rem'}}>
                      {g.course_name}
                      {g.is_ap&&<span style={{marginLeft:'0.4rem',fontSize:'0.7rem',background:'#7c3aed',color:'#fff',padding:'1px 5px',borderRadius:'3px'}}>AP</span>}
                      {g.is_honors&&<span style={{marginLeft:'0.3rem',fontSize:'0.7rem',background:'#0369a1',color:'#fff',padding:'1px 5px',borderRadius:'3px'}}>H</span>}
                    </div>
                    <div style={{fontSize:'0.78rem',color:'var(--dim)'}}>{g.credit_hours} cr · {g.source==='parsed'?'📋 imported':'✏️ manual'}</div>
                  </div>
                  <div style={{textAlign:'right',marginRight:'1rem'}}>
                    <div style={{fontSize:'1.3rem',fontWeight:700,color:g.grade_points>=3.7?'#059669':g.grade_points>=2.7?'#d97706':g.grade_points!==null?'#dc2626':'var(--dim)'}}>{g.grade_letter||'N/A'}</div>
                    <div style={{fontSize:'0.75rem',color:'var(--dim)'}}>{g.grade_points!==null?g.grade_points.toFixed(1):''}</div>
                  </div>
                  <button onClick={()=>deleteGrade(g.id)} className="btn btn-sm" style={{background:'transparent',color:'var(--dim)',border:'1px solid var(--faint)',fontSize:'0.75rem'}}>&#x2715;</button>
                </div>
              ))}
            </div>
          ))
        )}
        {tab==='add'&&(
          <div className="card" style={{padding:'1.2rem'}}>
            <div style={{display:'grid',gap:'0.8rem'}}>
              <div><label className="label">Course Name</label><input className="input" value={form.course_name} onChange={e=>setForm(p=>({...p,course_name:e.target.value}))} placeholder="e.g. AP Psychology"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0.6rem'}}>
                <div><label className="label">Grade</label>
                  <select className="input" value={form.grade_letter} onChange={e=>setForm(p=>({...p,grade_letter:e.target.value}))}>
                    {Object.keys(GRADE_POINTS).filter(k=>k!=='P'&&k!=='W'&&k!=='I').map(g=><option key={g} value={g}>{g} ({GRADE_POINTS[g]?.toFixed(1)||'N/A'})</option>)}
                    <option value="P">P (Pass)</option>
                  </select>
                </div>
                <div><label className="label">Credits</label><input className="input" type="number" min="0.5" max="6" step="0.5" value={form.credit_hours} onChange={e=>setForm(p=>({...p,credit_hours:e.target.value}))}/></div>
                <div><label className="label">Semester</label>
                  <select className="input" value={form.semester} onChange={e=>setForm(p=>({...p,semester:e.target.value}))}>
                    {SEMESTERS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:'flex',gap:'1.5rem'}}>
                <label style={{display:'flex',alignItems:'center',gap:'0.4rem',cursor:'pointer',fontSize:'0.88rem'}}><input type="checkbox" checked={form.is_ap} onChange={e=>setForm(p=>({...p,is_ap:e.target.checked}))}/>AP Course</label>
                <label style={{display:'flex',alignItems:'center',gap:'0.4rem',cursor:'pointer',fontSize:'0.88rem'}}><input type="checkbox" checked={form.is_honors} onChange={e=>setForm(p=>({...p,is_honors:e.target.checked}))}/>Honors / CP</label>
              </div>
              <button className="btn btn-gold" onClick={addGrade} disabled={saving}>{saving?'Saving...':'➕ Add Course'}</button>
            </div>
          </div>
        )}
        {tab==='parse'&&(
          <div>
            <div className="info-box" style={{marginBottom:'1rem'}}><strong>📋 Import from Transcript</strong>Paste your transcript text below. The AI Coach will extract all courses and grades automatically.</div>
            <textarea className="input" style={{minHeight:'200px',resize:'vertical',fontFamily:'monospace',fontSize:'0.82rem'}} value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste your transcript text here...&#10;&#10;Example:&#10;Fall 2024&#10;AP Psychology  A  1.0&#10;AP Statistics  B+  1.0"/>
            <button className="btn btn-gold" style={{marginTop:'0.8rem',width:'100%'}} onClick={parseTranscript} disabled={parsing}>{parsing?'🤖 Parsing transcript...':'🤖 Import with AI Coach'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── COACH MODULE ──────────────────────────────────────────────────────────────
function CoachModule({ user, toast }) {
  const [tab, setTab] = useState('chat');
  const [messages, setMessages] = useState([{role:'assistant',content:"Hi Sloan! I'm your Coach. I know your full profile, GPA, courses, activities, and everything in your Document Vault. Ask me anything — I can fill out application forms, help with essays, explain financial aid, quiz you on forensic psychology, or tell you what documents you still need. What do you need today?"}]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [formText, setFormText] = useState('');
  const [formResult, setFormResult] = useState('');
  const [essayPrompt, setEssayPrompt] = useState('');
  const [essayDraft, setEssayDraft] = useState('');
  const [essayResult, setEssayResult] = useState('');
  const [essayLoading, setEssayLoading] = useState(false);
  const [formLoading, setFormLoading] = useState(false);
  const [essayType, setEssayType] = useState('Common App Personal Statement (650 words)');
  const bottomRef = useRef();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,loading]);

  const getVaultContext = async () => {
    try {
      const [docs, achs, grades] = await Promise.all([api('documents').catch(()=>[]),api('achievements').catch(()=>[]),api('grades').catch(()=>[])]);
      const docStr = docs?.length?'Uploaded documents: '+docs.map(d=>`${d.name} (${d.category})`).join(', '):'No documents uploaded yet.';
      const achStr = achs?.length?'Achievements: '+achs.map(a=>`${a.title} (${a.role})`).join(', '):'';
      const liveGpa = calcGPA(grades||[]);
      const gpaStr = liveGpa!==null?`Sloan's GPA: ${liveGpa.toFixed(3)} (${(grades||[]).length} courses tracked)`:"Sloan's GPA: 3.55 UW / 3.79 W";
      const courseList = grades&&grades.length>0?'Recent courses: '+grades.slice(-5).map(g=>`${g.course_name} (${g.semester})`).join(', '):'';
      return gpaStr+'\n'+docStr+(achStr?'\n'+achStr:'')+(courseList?'\n'+courseList:'');
    } catch(e) { return 'Vault context unavailable.'; }
  };

  const callCoach = async (msgs) => {
    const vaultContext = await getVaultContext();
    const data = await api('coach',{method:'POST',body:JSON.stringify({messages:msgs.filter((m,i)=>m.role!=='assistant'||i>0),vaultContext})});
    return data.content||'No response.';
  };

  const sendChat = async () => {
    if(!input.trim()||loading) return;
    const userMsg={role:'user',content:input.trim()};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);
    setInput('');
    setLoading(true);
    try { const reply=await callCoach(newMsgs); if(reply) setMessages(p=>[...p,{role:'assistant',content:reply}]); }
    catch(e) { toast('Coach error: '+e.message,'error'); }
    setLoading(false);
  };

  const analyzeForm = async () => {
    if(!formText.trim()) return;
    setFormLoading(true);
    try { const reply=await callCoach([{role:'user',content:`Analyze this college application form and generate answers using Sloan's real information. Format as:\n[FIELD NAME]\nAnswer: [answer]\n\nForm:\n${formText}`}]); setFormResult(reply||''); }
    catch(e) { toast('Coach error','error'); }
    setFormLoading(false);
  };

  const getEssayHelp = async (mode) => {
    setEssayLoading(true);
    const prompt = mode==='outline'
      ?`Generate a structured essay outline for Sloan. Essay type: ${essayType}. Prompt: ${essayPrompt||(general personal statement)}`
      :`Review this essay draft and give specific feedback. Essay type: ${essayType}. Prompt: ${essayPrompt}.\n\nDraft:\n${essayDraft}`;
    try { const reply=await callCoach([{role:'user',content:prompt}]); setEssayResult(reply||''); }
    catch(e) { toast('Coach error','error'); }
    setEssayLoading(false);
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title serif">Your AI <em style={{color:'var(--gold)'}}>Coach</em> &#x1F916;</div>
        <div className="page-sub">Powered by Claude · Knows your full profile and vault</div>
      </div>
      <div className="page-content">
        <div className="tabs">
          {[['chat','💬 Chat'],['form','📋 Form Filler'],['essay','✍️ Essay Coach']].map(([id,label])=>(
            <div key={id} className={`tab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</div>
          ))}
        </div>
        {tab==='chat'&&(
          <div className="chat-area">
            <div className="chat-messages">
              {messages.map((m,i)=>(
                <div key={i} className={`chat-bubble ${m.role==='user'?'user':'coach'}`}>
                  {m.content.split('\n').map((line,j)=><div key={j}>{line||'\u00a0'}</div>)}
                </div>
              ))}
              {loading&&<div className="typing chat-bubble coach"><span/><span/><span/></div>}
              <div ref={bottomRef}/>
            </div>
            <div className="chat-input-row">
              <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder="Ask your Coach anything..." disabled={loading}/>
              <button className="btn btn-gold" onClick={sendChat} disabled={loading||!input.trim()}>Send</button>
              <button className="btn btn-ghost" onClick={()=>setMessages([messages[0]])}>Clear</button>
            </div>
            <div style={{marginTop:'0.5rem',display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
              {['Fill my Common App activities section','What documents am I missing?','Help me write my personal statement','Explain FAFSA to me simply'].map(s=>(
                <span key={s} style={{fontSize:'0.72rem',padding:'0.25rem 0.7rem',border:'1px solid var(--faint)',cursor:'pointer',color:'var(--dim)'}} onClick={()=>setInput(s)}>{s}</span>
              ))}
            </div>
          </div>
        )}
        {tab==='form'&&(
          <div>
            <div style={{background:'#fff8e8',border:'1px solid var(--gold)',padding:'0.8rem 1rem',marginBottom:'1rem',fontSize:'0.82rem'}}>&#x26A0; Review all answers before pasting. Always verify school-specific requirements.</div>
            <label className="label">Paste any college application form, FAFSA section, or scholarship question here</label>
            <textarea className="input mb2" style={{minHeight:180}} value={formText} onChange={e=>setFormText(e.target.value)} placeholder="Paste the form fields or questions here..."/>
            <button className="btn btn-gold" onClick={analyzeForm} disabled={formLoading||!formText.trim()}>{formLoading?'Analyzing...':'🤖 Analyze & Fill Form'}</button>
            {formResult&&(
              <div style={{marginTop:'1.5rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                  <div className="section-label" style={{margin:0}}>Coach-Generated Answers</div>
                  <button className="btn btn-outline btn-sm" onClick={()=>{navigator.clipboard.writeText(formResult);toast('Copied!','success');}}>Copy All</button>
                </div>
                <div style={{background:'var(--white)',border:'1px solid var(--faint)',padding:'1.2rem',whiteSpace:'pre-wrap',fontFamily:'DM Mono,monospace',fontSize:'0.78rem',lineHeight:1.8}}>{formResult}</div>
              </div>
            )}
          </div>
        )}
        {tab==='essay'&&(
          <div>
            <div className="mb2"><label className="label">Essay Type</label>
              <select className="select" value={essayType} onChange={e=>setEssayType(e.target.value)}>
                {['Common App Personal Statement (650 words)','Why This School Essay (250-650 words)','Scholarship Essay (varies)','Extracurricular Activity Description (150 chars)','Short Answer (100-250 words)'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="mb2"><label className="label">Essay Prompt</label><textarea className="input" style={{minHeight:80}} value={essayPrompt} onChange={e=>setEssayPrompt(e.target.value)} placeholder="Paste the essay prompt or question here..."/></div>
            <div className="mb2"><label className="label">Your Draft (optional — paste for feedback)</label><textarea className="input" style={{minHeight:120}} value={essayDraft} onChange={e=>setEssayDraft(e.target.value)} placeholder="Paste your draft here to get specific feedback..."/></div>
            <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
              <button className="btn btn-gold" onClick={()=>getEssayHelp('outline')} disabled={essayLoading}>Get Outline</button>
              <button className="btn btn-primary" onClick={()=>getEssayHelp('review')} disabled={essayLoading||!essayDraft.trim()}>Review My Draft</button>
            </div>
            {essayLoading&&<div className="mt2 mono" style={{fontSize:'0.65rem',color:'var(--gold)',letterSpacing:'0.1em'}}>Coach is thinking...</div>}
            {essayResult&&(
              <div style={{marginTop:'1.5rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                  <div className="section-label" style={{margin:0}}>Coach Response</div>
                  <button className="btn btn-outline btn-sm" onClick={()=>{navigator.clipboard.writeText(essayResult);toast('Copied!','success');}}>Copy</button>
                </div>
                <div style={{background:'var(--white)',border:'1px solid var(--faint)',padding:'1.2rem',whiteSpace:'pre-wrap',fontSize:'0.88rem',lineHeight:1.75}}>{essayResult}</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const { toasts, toast } = useToast();
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(()=>{
    const existing = getUser();
    if(existing) setUser(existing);
    setAuthLoading(false);
  },[]);

  const [sidebarOpen, setSidebarOpen] = useState(false);
  const closeSidebar = () => setSidebarOpen(false);

  const signOut = () => {
    ['sm_token','sm_userId','sm_email','sm_role'].forEach(k=>localStorage.removeItem(k));
    setUser(null);
  };

  if(authLoading) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="typing"><span/><span/><span/></div></div>;
  if(!user) return <><ToastContainer toasts={toasts}/><LoginScreen onLogin={setUser} toast={toast}/></>;

  const moduleProps = { user, toast };

  return (
    <div style={{display:'flex'}}>
      <ToastContainer toasts={toasts}/>
      <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)} aria-label="Menu"><span/><span/><span/></button>
      <div className={`sidebar-overlay${sidebarOpen?' open':''}`} onClick={closeSidebar}/>
      <Sidebar page={page} onNav={(p)=>{setPage(p);closeSidebar();}} user={user} onSignOut={signOut} open={sidebarOpen}/>
      <div className="main-area" style={{flex:1}}>
        {page==='home'         && <HomeModule {...moduleProps} onNav={setPage}/>}
        {page==='library'      && <LibraryModule {...moduleProps} onNav={setPage}/>}
        {page==='vault'        && <VaultModule {...moduleProps}/>}
        {page==='tracker'      && <TrackerModule {...moduleProps}/>}
        {page==='achievements' && <AchievementsModule {...moduleProps}/>}
        {page==='financial'    && <FinancialModule {...moduleProps}/>}
        {page==='gpa'          && <GpaModule user={user} toast={toast}/>}
        {page==='coach'        && <CoachModule user={user} toast={toast}/>}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return(
      <div style={{fontFamily:'monospace',padding:'2rem',color:'#9a1a1a',background:'#faf7f2',minHeight:'100vh'}}>
        <h2>SloanMelia Error</h2>
        <p><strong>{this.state.err.message}</strong></p>
        <pre style={{fontSize:'0.75rem',whiteSpace:'pre-wrap'}}>{this.state.err.stack}</pre>
        <button onClick={()=>this.setState({err:null})} style={{marginTop:'1rem',padding:'0.5rem 1rem',cursor:'pointer'}}>Retry</button>
      </div>
    );
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
